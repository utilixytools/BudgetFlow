<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter - UtilixyTools</title>

<link rel="icon" href="logo.png">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #022c22, #064e3b);
  color: white;
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 520px;
  margin: auto;
}

.back {
  color: white;
  text-decoration: none;
  font-weight: bold;
  display: block;
  margin-bottom: 20px;
}

h1 {
  text-align: center;
  margin: 20px 0 30px;
  font-size: 36px;
}

.card {
  background: #f9fafb;
  color: black;
  padding: 26px;
  border-radius: 24px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}

label {
  display: block;
  font-weight: bold;
  margin-top: 15px;
  margin-bottom: 6px;
  font-size: 16px;
}

input, select {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  border-radius: 16px;
  border: none;
  background: #064e3b;
  color: white;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #065f46;
}

.result {
  margin-top: 20px;
  font-size: 22px;
  font-weight: bold;
  text-align: center;
}

.info {
  margin-top: 10px;
  font-size: 13px;
  text-align: center;
  color: #6b7280;
}

@media (max-width: 600px) {
  h1 {
    font-size: 28px;
  }

  .card {
    padding: 20px;
  }
}
</style>
</head>

<body>

<div class="container">

  <a href="index.html" class="back">← Back</a>

  <h1>💱 Currency Converter</h1>

  <div class="card">

    <label>Amount</label>
    <input type="number" id="amount" placeholder="Example: 100">

    <label>From</label>
    <select id="from">
      <option value="CAD">CAD - Canadian Dollar</option>
      <option value="USD">USD - US Dollar</option>
      <option value="EUR">EUR - Euro</option>
      <option value="MAD">MAD - Moroccan Dirham</option>
      <option value="GBP">GBP - British Pound</option>
    </select>

    <label>To</label>
    <select id="to">
      <option value="USD">USD - US Dollar</option>
      <option value="CAD">CAD - Canadian Dollar</option>
      <option value="EUR">EUR - Euro</option>
      <option value="MAD">MAD - Moroccan Dirham</option>
      <option value="GBP">GBP - British Pound</option>
    </select>

    <button onclick="convertCurrency()">Convert</button>

    <div class="result" id="result"></div>
    <div class="info" id="info"></div>

  </div>

</div>

<script>
async function convertCurrency() {
  const amount = document.getElementById("amount").value;
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;
  const result = document.getElementById("result");
  const info = document.getElementById("info");

  if (!amount || amount <= 0) {
    result.innerHTML = "Enter a valid amount.";
    info.innerHTML = "";
    return;
  }

  result.innerHTML = "Converting...";
  info.innerHTML = "";

  try {
    const response = await fetch(`https://open.er-api.com/v6/latest/${from}`);
    const data = await response.json();

    if (data.result !== "success") {
      result.innerHTML = "Rate unavailable.";
      return;
    }

    const rate = data.rates[to];
    const converted = amount * rate;

    result.innerHTML = `${amount} ${from} = ${converted.toFixed(2)} ${to}`;

    info.innerHTML = `
      Rate: 1 ${from} = ${rate.toFixed(4)} ${to}<br>
      Updated: ${data.time_last_update_utc}<br>
      *Rates are estimates and may differ from banks or exchange offices.
    `;

  } catch (error) {
    result.innerHTML = "Error. Try again.";
    info.innerHTML = "";
  }
}
</script>

</body>
</html>
