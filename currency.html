<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter - UtilixyTools</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #022c22, #064e3b);
  color: white;
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 420px;
  margin: auto;
}

.card {
  background: white;
  color: #111;
  padding: 22px;
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}

h1 {
  text-align: center;
}

label {
  font-weight: bold;
  margin-top: 12px;
  display: block;
}

input, select, button {
  width: 100%;
  padding: 13px;
  margin-top: 8px;
  border-radius: 12px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  background: #064e3b;
  color: white;
  border: none;
  font-weight: bold;
  cursor: pointer;
  margin-top: 18px;
}

.result {
  margin-top: 18px;
  font-size: 22px;
  font-weight: bold;
  text-align: center;
}

.back {
  color: white;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <a href="index.html" class="back">← Back</a>

  <h1>Currency Converter</h1>

  <div class="card">
    <label>Amount</label>
    <input type="number" id="amount" placeholder="Example: 100">

    <label>From</label>
    <select id="from">
      <option value="CAD">CAD - Canadian Dollar</option>
      <option value="USD">USD - US Dollar</option>
      <option value="EUR">EUR - Euro</option>
      <option value="MAD">MAD - Moroccan Dirham</option>
      <option value="GBP">GBP - British Pound</option>
    </select>

    <label>To</label>
    <select id="to">
      <option value="USD">USD - US Dollar</option>
      <option value="CAD">CAD - Canadian Dollar</option>
      <option value="EUR">EUR - Euro</option>
      <option value="MAD">MAD - Moroccan Dirham</option>
      <option value="GBP">GBP - British Pound</option>
    </select>

    <button onclick="convertCurrency()">Convert</button>

    <div class="result" id="result"></div>
  </div>
</div>

<script>
async function convertCurrency() {
  const amount = document.getElementById("amount").value;
  const from = document.getElementById("from").value;
  const to = document.getElementById("to").value;
  const result = document.getElementById("result");

  if (!amount || amount <= 0) {
    result.innerHTML = "Please enter a valid amount.";
    return;
  }

  result.innerHTML = "Converting...";

  try {
    const response = await fetch(`https://open.er-api.com/v6/latest/${from}`);
    const data = await response.json();

    const rate = data.rates[to];
    const converted = amount * rate;

    result.innerHTML = `${amount} ${from} = ${converted.toFixed(2)} ${to}`;
  } catch (error) {
    result.innerHTML = "Error. Please try again.";
  }
}
</script>

</body>
</html>
