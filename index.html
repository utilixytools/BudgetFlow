<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UtilixyTools | Free Online Tools</title>
  <meta name="description" content="UtilixyTools offers free simple online tools to make life easier.">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #022c22, #064e3b);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      text-align: center;
    }

    img {
      width: 90px;
      border-radius: 18px;
      margin-top: 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 5px;
    }

    p {
      color: #d1fae5;
    }

    .tools {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 35px;
    }

    .tool-card {
      background: white;
      color: #111827;
      padding: 25px;
      border-radius: 24px;
      text-decoration: none;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      transition: 0.2s;
    }

    .tool-card:hover {
      transform: translateY(-5px);
    }

    .tool-card h2 {
      color: #064e3b;
      margin-top: 0;
    }

    .tool-card p {
      color: #4b5563;
    }

    .coming-soon {
      opacity: 0.6;
      pointer-events: none;
    }

    footer {
      margin-top: 40px;
      color: #d1fae5;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="logo.png" alt="UtilixyTools Logo">

    <h1>UtilixyTools</h1>
    <p>Free simple tools that make life easier.</p>

    <div class="tools">

      <a href="budget.html" class="tool-card">
        <h2>BudgetFlow</h2>
        <p>Weekly budget calculator</p>
      </a>

      <div class="tool-card coming-soon">
        <h2>Tip Calculator</h2>
        <p>Coming soon</p>
      </div>

      <div class="tool-card coming-soon">
        <h2>Rent Splitter</h2>
        <p>Coming soon</p>
      </div>

      <div class="tool-card coming-soon">
        <h2>Salary Calculator</h2>
        <p>Coming soon</p>
      </div>

    </div>

    <footer>
      © 2026 UtilixyTools. Simple tools. Smart solutions.
    </footer>
  </div>

</body>
</html>
