<!DOCTYPE html>
<html lang="en">
<head>

  <title>UtilixyTools</title>

  <!-- ✅ ICON -->
  <link rel="icon" type="image/png" href="logo.png">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #022c22, #064e3b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    img {
      width: 80px;
      margin-bottom: 10px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .tool {
      display: block;
      background: white;
      color: black;
      padding: 15px;
      margin: 10px auto;
      width: 250px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
    }

    .tool:hover {
      background: #e5e7eb;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="logo.png" alt="logo">
    <h1>UtilixyTools</h1>

    <a href="budget.html" class="tool">💰 BudgetFlow</a>
