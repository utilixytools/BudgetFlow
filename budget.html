<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BudgetFlow | Weekly Budget Calculator</title>
  <meta name="description" content="BudgetFlow is a free weekly budget calculator that helps you track income, expenses, and money left.">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #022c22, #064e3b);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 430px;
      margin: auto;
    }

    .top {
      text-align: center;
      margin-bottom: 20px;
    }

    .top img {
      width: 80px;
      border-radius: 18px;
      margin-bottom: 10px;
    }

    .top h1 {
      margin: 0;
      font-size: 34px;
    }

    .top p {
      color: #d1fae5;
      margin-top: 6px;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .card {
      background: white;
      color: #111827;
      padding: 24px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    h2 {
      text-align: center;
      margin-top: 0;
      color: #064e3b;
    }

    h3 {
      margin-top: 25px;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 7px 0;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      font-size: 16px;
      background: #f9fafb;
    }

    input:focus {
      outline: none;
      border-color: #064e3b;
      background: white;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 18px;
      border: none;
      border-radius: 16px;
      background: #064e3b;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #022c22;
    }

    .clear-btn {
      background: #e5e7eb;
      color: #111827;
      margin-top: 10px;
    }

    .clear-btn:hover {
      background: #d1d5db;
    }

    .result {
      margin-top: 20px;
      padding: 18px;
      border-radius: 18px;
      background: #f3f4f6;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .positive { color: #15803d; }
    .negative { color: #dc2626; }
  </style>
</head>

<body>

  <div class="container">

    <a href="index.html" class="back">← Back to tools</a>

    <div class="top">
      <img src="logo.png" alt="UtilixyTools Logo">
      <h1>BudgetFlow</h1>
      <p>by UtilixyTools</p>
    </div>

    <div class="card">
      <h2>Weekly Budget Calculator</h2>

      <h3>Income</h3>
      <input id="job1" type="number" placeholder="Job income" oninput="calculateBudget()">
      <input id="job2" type="number" placeholder="Other income" oninput="calculateBudget()">
      <input id="extraIncome" type="number" placeholder="Extra income" oninput="calculateBudget()">

      <h3>Expenses</h3>
      <input id="phone" type="number" placeholder="Phone bill" oninput="calculateBudget()">
      <input id="metro" type="number" placeholder="Metro" oninput="calculateBudget()">
      <input id="hydro" type="number" placeholder="Hydro" oninput="calculateBudget()">
      <input id="groceries" type="number" placeholder="Groceries" oninput="calculateBudget()">
      <input id="restaurants" type="number" placeholder="Restaurants" oninput="calculateBudget()">
      <input id="extra" type="number" placeholder="Extra expenses" oninput="calculateBudget()">

      <button onclick="calculateBudget()">Calculate Budget</button>
      <button class="clear-btn" onclick="clearData()">Clear Saved Data</button>

      <div class="result" id="result">Money left: $0.00</div>
    </div>

  </div>

<script>
const fields = [
  "job1",
  "job2",
  "extraIncome",
  "phone",
  "metro",
  "hydro",
  "groceries",
  "restaurants",
  "extra"
];

window.onload = function() {
  fields.forEach(function(id) {
    const savedValue = localStorage.getItem("budgetflow_" + id);
    if (savedValue !== null) {
      document.getElementById(id).value = savedValue;
    }
  });

  calculateBudget();
};

function saveData() {
  fields.forEach(function(id) {
    const value = document.getElementById(id).value;
    localStorage.setItem("budgetflow_" + id, value);
  });
}

function calculateBudget() {
  const income =
    Number(document.getElementById("job1").value) +
    Number(document.getElementById("job2").value) +
    Number(document.getElementById("extraIncome").value);

  const expenses =
    Number(document.getElementById("phone").value) +
    Number(document.getElementById("metro").value) +
    Number(document.getElementById("hydro").value) +
    Number(document.getElementById("groceries").value) +
    Number(document.getElementById("restaurants").value) +
    Number(document.getElementById("extra").value);

  const moneyLeft = income - expenses;
  const result = document.getElementById("result");

  result.innerText = "Money left: $" + moneyLeft.toFixed(2);

  if (moneyLeft >= 0) {
    result.className = "result positive";
  } else {
    result.className = "result negative";
  }

  saveData();
}

function clearData() {
  fields.forEach(function(id) {
    localStorage.removeItem("budgetflow_" + id);
    document.getElementById(id).value = "";
  });

  calculateBudget();
}
</script>

</body>
</html>
