<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetFlow</title>

<link rel="icon" href="logo.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #022c22, #064e3b);
  color: white;
  padding: 20px;
  min-height: 100vh;
}

.container {
  max-width: 420px;
  margin: auto;
}

.back {
  color: white;
  text-decoration: none;
  font-weight: bold;
  display: block;
  margin-bottom: 15px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.card {
  background: #f9fafb;
  color: black;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}

.section-title {
  font-weight: bold;
  margin-top: 10px;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 8px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.calc-btn {
  background: #064e3b;
  color: white;
}

.clear-btn {
  background: #e5e7eb;
  color: black;
}

.result {
  margin-top: 15px;
  padding: 15px;
  background: white;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<h1>BudgetFlow</h1>

<div class="card">

<div class="section-title">Income</div>

<input id="job1" placeholder="Job income">
<input id="job2" placeholder="Other income">
<input id="extra" placeholder="Extra income">

<div class="section-title">Expenses</div>

<input id="phone" placeholder="Phone">
<input id="metro" placeholder="Metro">
<input id="hydro" placeholder="Hydro">
<input id="food" placeholder="Food">
<input id="resto" placeholder="Restaurants">

<button class="calc-btn" onclick="calc()">Calculate</button>
<button class="clear-btn" onclick="clearData()">Clear</button>

<div class="result" id="result">
Money left: $0
</div>

</div>
</div>

<script>
function calc(){
let income = +job1.value + +job2.value + +extra.value;
let expenses = +phone.value + +metro.value + +hydro.value + +food.value + +resto.value;

let total = income - expenses;

result.innerText = "Money left: $" + total.toFixed(2);
}

function clearData(){
job1.value="";
job2.value="";
extra.value="";
phone.value="";
metro.value="";
hydro.value="";
food.value="";
resto.value="";
result.innerText="Money left: $0";
}
</script>

</body>
</html>
