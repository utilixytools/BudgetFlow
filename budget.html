<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BudgetFlow</title>

<link rel="icon" href="logo.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#022c22,#064e3b);
  color: white;
  padding: 20px;
}

.container {
  max-width: 420px;
  margin: auto;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
}

.clear-btn {
  background: #ccc;
}

.result {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html">← Back</a>

<h1>BudgetFlow</h1>

<div class="card">

<input id="job1" placeholder="Job income">
<input id="job2" placeholder="Other income">
<input id="extra" placeholder="Extra income">

<input id="phone" placeholder="Phone">
<input id="metro" placeholder="Metro">
<input id="hydro" placeholder="Hydro">
<input id="food" placeholder="Food">
<input id="resto" placeholder="Restaurants">

<button onclick="calc()">Calculate</button>
<button class="clear-btn" onclick="clearData()">Clear</button>

<div id="result">Money left: $0</div>

</div>
</div>

<script>
function calc(){
let income = +job1.value + +job2.value + +extra.value;
let expenses = +phone.value + +metro.value + +hydro.value + +food.value + +resto.value;
let total = income - expenses;
result.innerText = "Money left: $" + total.toFixed(2);
}

function clearData(){
job1.value="";
job2.value="";
extra.value="";
phone.value="";
metro.value="";
hydro.value="";
food.value="";
resto.value="";
result.innerText="Money left: $0";
}
</script>

</body>
</html>
