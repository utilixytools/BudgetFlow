<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quebec Tax Calculator – GST/TPS and QST/TVQ</title>
<meta name="description" content="Calculate Quebec sales tax with this free GST/TPS and QST/TVQ calculator.">

<link rel="icon" href="logo.png">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #022c22, #064e3b);
  color: white;
  padding: 20px;
}

.container {
  max-width: 520px;
  margin: auto;
}

.back {
  color: white;
  text-decoration: none;
  font-weight: bold;
  display: block;
  margin-bottom: 15px;
}

h1 { text-align: center; }

.card {
  background: #f9fafb;
  color: black;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}

label { font-weight: bold; }

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  margin-top: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: #064e3b;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.mode-toggle {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.mode-toggle button {
  flex: 1;
  background: #e5e7eb;
  color: black;
}

.mode-toggle .active {
  background: #064e3b;
  color: white;
}

.result {
  margin-top: 15px;
  padding: 15px;
  background: white;
  border-radius: 12px;
  line-height: 1.8;
  font-weight: bold;
}

.disclaimer {
  margin-top: 15px;
  font-size: 12px;
  color: #6b7280;
}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back">← Back</a>

<h1>Quebec Tax Calculator</h1>

<div class="card">

<div class="mode-toggle">
  <button id="beforeBtn" class="active" onclick="setMode('before')">Before Tax</button>
  <button id="afterBtn" onclick="setMode('after')">After Tax</button>
</div>

<label id="label">Price before tax</label>
<input id="price" type="number" placeholder="100" oninput="calc()">

<button onclick="calc()">Calculate</button>

<div class="result" id="result">
GST/TPS: $0.00<br>
QST/TVQ: $0.00<br>
Total Tax: $0.00<br>
Total: $0.00
</div>

<div class="disclaimer">
This calculator is for informational purposes only and does not constitute financial or tax advice.
</div>

</div>

</div>

<script>
let mode = "before";

function setMode(newMode) {
  mode = newMode;

  document.getElementById("beforeBtn").classList.remove("active");
  document.getElementById("afterBtn").classList.remove("active");

  if (mode === "before") {
    document.getElementById("beforeBtn").classList.add("active");
    document.getElementById("label").innerText = "Price before tax";
  } else {
    document.getElementById("afterBtn").classList.add("active");
    document.getElementById("label").innerText = "Price after tax";
  }

  calc();
}

function format(num) {
  return "$" + num.toFixed(2);
}

function calc() {
  let price = Number(document.getElementById("price").value || 0);

  let gst, qst, total, base;

  if (mode === "before") {
    gst = price * 0.05;
    qst = price * 0.09975;
    total = price + gst + qst;
    base = price;
  } else {
    base = price / 1.14975;
    gst = base * 0.05;
    qst = base * 0.09975;
    total = price;
  }

  let totalTax = gst + qst;

  document.getElementById("result").innerHTML =
    "GST/TPS: " + format(gst) + "<br>" +
    "QST/TVQ: " + format(qst) + "<br>" +
    "Total Tax: " + format(totalTax) + "<br>" +
    "Total: " + format(total);
}
</script>

</body>
</html>
